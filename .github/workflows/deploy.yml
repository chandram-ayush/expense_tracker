name: Deploy Expense Tracker

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # THIS IS THE MAGIC STEP
      - name: Create credentials.json from Secret
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS_JSON }}
        run: |
          echo "$GCP_CREDENTIALS" > credentials.json
          
      # Now you can run your Docker build, because credentials.json exists!
      - name: Build Docker Image
        run: docker build -t expense-tracker .
        
      # (Add your deployment steps here...)
      - name: Stop Old Container
        # We ignore errors (|| true) in case the container doesn't exist yet
        run: docker-compose down || true

      - name: Build and Start New Container
        run: docker-compose up -d --build

      - name: Clean up unused Docker images
        # Removes old build images to save space on your friend's server
        run: docker image prune -f